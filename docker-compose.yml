services:
  bridge:
    container_name: bridge
    build:
      context: .
      dockerfile: services/bridge/Dockerfile
    environment:
      - SIMULATED_DAY_PATH=/app/data/simulated_day.json
      - ANCHOR_EVENTS_PATH=/app/data/anchor_events.json
      - SIMULATION_SPEED=${SIMULATION_SPEED:-6}
      - CALENDAR_TEST_MODE=${CALENDAR_TEST_MODE:-false}
      - CALENDAR_URL=${CALENDAR_URL:-https://nfs.faireconomy.media/ff_calendar_thisweek.json}
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN:-}
      - TELEGRAM_CHAT_ID=${TELEGRAM_CHAT_ID:-}
      - TELEGRAM_TEST_CHANNEL_ID=${TELEGRAM_TEST_CHANNEL_ID:-}
      - TELEGRAM_MODE=${TELEGRAM_MODE:-production}
      - TEST_CHANNEL=${TEST_CHANNEL:-false}
      - ADMIN_CHAT_ID=${ADMIN_CHAT_ID:-}
      - AI_ENABLED=${AI_ENABLED:-false}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - AI_MODEL=${AI_MODEL:-gpt-4.1-mini}
      - AI_TIMEOUT_MS=${AI_TIMEOUT_MS:-8000}
      - HEARTBEAT_INTERVAL_MS=${HEARTBEAT_INTERVAL_MS:-}
      - SIMULATION_NOW=${SIMULATION_NOW:-}
      - BRIDGE_CRON_INTERVAL_MS=${BRIDGE_CRON_INTERVAL_MS:-30000}
    volumes:
      - ./data:/app/data:ro
      - bridge_state:/app/bridge-state
    ports:
      - "3000:3000"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:3000/health').then(r => { if (!r.ok) process.exit(1); }).catch(() => process.exit(1))"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 10s
    networks:
      - trade-network
  n8n:
    container_name: n8n
    image: n8nio/n8n:latest
    environment:
      - N8N_HOST=n8n
      - N8N_PORT=5678
      - GENERIC_TIMEZONE=UTC
      - N8N_SECURE_COOKIE=false
      - SIMULATION_DAY_FILE=${SIMULATION_DAY_FILE:-}
      - SIMULATION_DAY_JSON=${SIMULATION_DAY_JSON:-}
      - SIMULATION_SPEED=${SIMULATION_SPEED:-1}
      - TEST_EVENT_JSON=${TEST_EVENT_JSON:-}
    ports:
      - "5678:5678"
    volumes:
      - n8n_data:/home/node/.n8n
      - ./data:/app/data:ro
    restart: unless-stopped
    networks:
      - trade-network
networks:
  trade-network:
    driver: bridge

volumes:
  n8n_data:
  bridge_state:
